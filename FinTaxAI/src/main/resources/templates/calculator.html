<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Calculator - FinTax AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/"><strong>FinTax AI</strong></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/calculator">Calculator</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history">History</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chatbot">AI Assistant</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-4">Tax Calculator</h2>
        
        <ul class="nav nav-tabs" id="taxTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="income-tab" data-bs-toggle="tab" data-bs-target="#income" type="button">Income Tax</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="corporate-tab" data-bs-toggle="tab" data-bs-target="#corporate" type="button">Corporate Tax</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="sales-tab" data-bs-toggle="tab" data-bs-target="#sales" type="button">Sales/GST Tax</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="property-tab" data-bs-toggle="tab" data-bs-target="#property" type="button">Property Tax</button>
            </li>
        </ul>
        
        <div class="tab-content mt-4" id="taxTabContent">
            <div class="tab-pane fade show active" id="income" role="tabpanel">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Income Tax Calculator</h5>
                        <form action="/tax/income" method="post">
                            <div class="mb-3">
                                <label for="incomeName" class="form-label">Name (Optional)</label>
                                <input type="text" class="form-control" id="incomeName" name="userName">
                            </div>
                            <div class="mb-3">
                                <label for="income" class="form-label">Gross Annual Income (₹)</label>
                                <input type="number" class="form-control" id="income" name="income" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="deductions" class="form-label">Total Deductions (₹)</label>
                                <input type="number" class="form-control" id="deductions" name="deductions" step="0.01" value="0">
                                <small class="text-muted">Including 80C, 80D, HRA, etc.</small>
                            </div>
                            <button type="submit" class="btn btn-primary">Calculate Income Tax</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="tab-pane fade" id="corporate" role="tabpanel">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Corporate Tax Calculator</h5>
                        <form action="/tax/corporate" method="post">
                            <div class="mb-3">
                                <label for="corporateName" class="form-label">Company Name (Optional)</label>
                                <input type="text" class="form-control" id="corporateName" name="userName">
                            </div>
                            <div class="mb-3">
                                <label for="profit" class="form-label">Annual Profit (₹)</label>
                                <input type="number" class="form-control" id="profit" name="profit" step="0.01" required>
                            </div>
                            <button type="submit" class="btn btn-success">Calculate Corporate Tax</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="tab-pane fade" id="sales" role="tabpanel">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Sales/GST Tax Calculator</h5>
                        <form action="/tax/sales" method="post">
                            <div class="mb-3">
                                <label for="salesName" class="form-label">Name (Optional)</label>
                                <input type="text" class="form-control" id="salesName" name="userName">
                            </div>
                            <div class="mb-3">
                                <label for="salesAmount" class="form-label">Sales Amount (₹)</label>
                                <input type="number" class="form-control" id="salesAmount" name="salesAmount" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="gstRate" class="form-label">GST Rate (%)</label>
                                <select class="form-select" id="gstRate" name="gstRate" required>
                                    <option value="5">5% - Essential Goods</option>
                                    <option value="12">12% - Standard Goods</option>
                                    <option value="18" selected>18% - Most Goods & Services</option>
                                    <option value="28">28% - Luxury Items</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-warning">Calculate GST</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="tab-pane fade" id="property" role="tabpanel">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Property Tax Calculator</h5>
                        <form action="/tax/property" method="post">
                            <div class="mb-3">
                                <label for="propertyName" class="form-label">Owner Name (Optional)</label>
                                <input type="text" class="form-control" id="propertyName" name="userName">
                            </div>
                            <div class="mb-3">
                                <label for="propertyValue" class="form-label">Property Value (₹)</label>
                                <input type="number" class="form-control" id="propertyValue" name="propertyValue" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="propertyArea" class="form-label">Property Area (sq ft)</label>
                                <input type="number" class="form-control" id="propertyArea" name="propertyArea" step="0.01" required>
                            </div>
                            <button type="submit" class="btn btn-info">Calculate Property Tax</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-3 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 FinTax AI - Smart Tax Calculator. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
